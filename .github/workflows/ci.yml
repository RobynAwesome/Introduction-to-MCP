name: Kopano CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Test with pytest
        run: |
          python -m pytest -q

      - name: Compile package
        run: |
          python -m compileall kopano-core kopano-core/kopano

  cli-package-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate CLI subproject install
        run: |
          python -m pip install --upgrade pip
          pip install -e ./CLI

  gui-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: kopano-core/studio

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: kopano-core/studio/package-lock.json

      - name: Install GUI dependencies
        run: npm ci

      - name: Lint GUI
        run: npm run lint

      - name: Build GUI
        run: npm run build
